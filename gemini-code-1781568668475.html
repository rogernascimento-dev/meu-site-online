<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Dev — Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>☕ Café Dev</h1>
        <p>O melhor combustível para o seu código</p>
    </header>

    <main class="container">
        <section class="cardapio">
            <h2>Nosso Cardápio</h2>
            <div class="lista-produtos">
                <div class="produto-card">
                    <h3>Espresso</h3>
                    <p class="preco">R$ 6,00</p>
                    <button onclick="adicionarAoCarrinho('Espresso', 6.00)">Adicionar</button>
                </div>
                <div class="produto-card">
                    <h3>Cappuccino</h3>
                    <p class="preco">R$ 9,50</p>
                    <button onclick="adicionarAoCarrinho('Cappuccino', 9.50)">Adicionar</button>
                </div>
                <div class="produto-card">
                    <h3>Croissant de Queijo</h3>
                    <p class="preco">R$ 12,00</p>
                    <button onclick="adicionarAoCarrinho('Croissant de Queijo', 12.00)">Adicionar</button>
                </div>
                <div class="produto-card">
                    <h3>Pedaço de Bolo</h3>
                    <p class="preco">R$ 8,00</p>
                    <button onclick="adicionarAoCarrinho('Pedaço de Bolo', 8.00)">Adicionar</button>
                </div>
            </div>
        </section>

        <aside class="carrinho">
            <h2>Seu Pedido</h2>
            <ul id="itens-carrinho">
                <li class="vazio">Nenhum item selecionado</li>
            </ul>
            <div class="total-container">
                <strong>Total:</strong>
                <span id="valor-total">R$ 0,00</span>
            </div>
            <button id="btn-finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
